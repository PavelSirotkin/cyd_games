; PlatformIO Project Configuration
; CYD Games — ESP32-2432S028 (Cheap Yellow Display)

[env:esp32-2432S028]
platform  = espressif32@6.9.0
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600
board_build.partitions = partitions.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^8.3.11
    ayushsharma82/ElegantOTA@^3.1.0
    bblanchon/ArduinoJson@^6.21.5

build_flags =
    ; ── LVGL ──
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_TICK_PERIOD_MS=5

    ; ── TFT_eSPI: ST7789 (JC2432W328RC) ──
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=27
    -DTFT_BACKLIGHT_ON=HIGH
    -DTFT_RGB_ORDER=TFT_BGR
    -DTOUCH_CS=-1
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

    ; ── ElegantOTA sync mode ──
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=0

    ; ── Build info ──
    -DFW_VERSION=\"4.10.0\"

build_src_filter =
    +<*>
    +<hal/>
    +<net/>
    +<ui/>
    +<games/>
